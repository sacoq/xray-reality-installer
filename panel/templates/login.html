<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>xnPanel — вход</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.14.1/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="/static/styles.css"/>
</head>
<body class="login-body text-slate-100">
  <div id="globe-bg" aria-hidden="true"></div>

  <div x-data="loginCtrl()" class="login-card relative">
    <div class="bg-slate-900 border border-slate-800 rounded-2xl p-7 shadow-xl">
      <h1 class="mb-1">xnPanel</h1>
      <p class="text-slate-400 text-sm mb-6">Войдите, чтобы управлять серверами.</p>
      <form @submit.prevent="submit()" class="space-y-3">
        <div>
          <label class="block text-sm text-slate-400 mb-1.5">Логин</label>
          <input x-model="username" type="text" autocomplete="username"
                 class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 focus:outline-none focus:border-indigo-500"/>
        </div>
        <div>
          <label class="block text-sm text-slate-400 mb-1.5">Пароль</label>
          <input x-model="password" type="password" autocomplete="current-password"
                 class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 focus:outline-none focus:border-indigo-500"/>
        </div>
        <div x-show="needTotp" x-transition>
          <label class="block text-sm text-slate-400 mb-1.5">Код из Google Authenticator / Authy (6 цифр)</label>
          <input x-model="totp" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="6"
                 autocomplete="one-time-code"
                 x-ref="totpInput"
                 class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 focus:outline-none focus:border-indigo-500 tracking-[0.3em] text-center"/>
        </div>
        <button class="w-full bg-indigo-600 hover:bg-indigo-500 transition rounded-lg py-2.5 font-medium mt-2"
                :disabled="busy" x-text="busy ? 'Входим…' : 'Войти'"></button>
        <p x-show="error" x-text="error" class="text-red-400 text-sm"></p>
      </form>
    </div>
    <p class="text-center text-slate-600 text-xs mt-4 tracking-wide">xnPanel · xray reality control</p>
  </div>

  <script>
    function loginCtrl() {
      return {
        username: "", password: "", totp: "", needTotp: false, busy: false, error: "",
        async submit() {
          this.busy = true; this.error = "";
          try {
            const body = {username: this.username, password: this.password};
            if (this.needTotp) body.totp = this.totp;
            const r = await fetch("/api/auth/login", {
              method: "POST",
              headers: {"content-type":"application/json"},
              body: JSON.stringify(body),
            });
            if (!r.ok) {
              const j = await r.json().catch(() => ({}));
              const d = j.detail || "";
              if (d === "totp required") {
                // Reveal the TOTP field without showing an error.
                this.needTotp = true;
                this.error = "";
                this.$nextTick(() => this.$refs.totpInput && this.$refs.totpInput.focus());
                return;
              }
              if (d === "invalid totp code") {
                this.error = "Неверный код 2FA";
                return;
              }
              this.error = d || ("Ошибка " + r.status);
              return;
            }
            window.location.href = "/ui";
          } catch (e) {
            this.error = "Сеть: " + e.message;
          } finally {
            this.busy = false;
          }
        }
      }
    }
  </script>
  <script src="/static/net-bg.js" defer></script>
</body>
</html>
