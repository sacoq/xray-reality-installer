name: lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run shellcheck
        run: shellcheck -s bash install.sh

  syntax:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Bash syntax check
        run: bash -n install.sh
